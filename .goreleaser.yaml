# .goreleaser.yaml

version: 2

project_name: security-news-scraper

before:
  hooks:
    - go mod tidy

builds:
  - id: security-news-scraper
    main: ./cmd/security-news-scraper
    binary: security-news-scraper
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/Harsh-Sonker/security-news-scraper/internal/version.Version={{ .Version }}

archives:
  - id: security-news-scraper
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: HarshSonker
    name: security-news-scraper
